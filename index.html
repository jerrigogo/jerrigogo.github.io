<!doctype html>
<html lang="ko">
  <head>
    <title>VUE Example</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, minimum-scale=1.0" />
    <link rel="icon" href="/favicon.ico" />
    <script type="module" crossorigin src="/assets/index-BCeJJJtI.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-0kDRegV5.css">
  </head>
  <body>
    <div id="app" class="wrap"></div>
    <div class="modal-layout"></div>
    <script>
      // device 체크
      let userAgent = navigator.userAgent;
      let html = document.querySelector('html');
      let device = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i;

      if (device.test(userAgent)) {
        html.classList.add('mobile');
      } else {
        html.classList.remove('mobile');
      }
    </script>
  </body>
</html>
